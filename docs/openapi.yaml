openapi: 3.0.3
info:
  title: OpenClaw Backend API
  version: 1.1.0
  description: |
    OpenClaw 项目后端接口文档（基于当前实现）。

    - 基础地址: http://127.0.0.1:4000
    - 管理端接口需要 admin 角色
servers:
  - url: http://127.0.0.1:4000
tags:
  - name: Health
  - name: Auth
  - name: Customer
  - name: Modules
  - name: Admin
  - name: Reports
paths:
  /api/health:
    get:
      tags: [Health]
      summary: 健康检查
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: 当前登录用户
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/customer/dashboard:
    get:
      tags: [Customer]
      summary: 客户中心仪表盘
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDashboardData'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'

  /api/modules:
    get:
      tags: [Modules]
      summary: 获取当前用户开通模块
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleMeta'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /api/modules/{moduleKey}/history:
    get:
      tags: [Modules]
      summary: 获取模块任务历史
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleTaskResult'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/modules/{moduleKey}/schema:
    get:
      tags: [Modules]
      summary: 获取模块输入 schema
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleTaskSchema'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/modules/{moduleKey}/tasks:
    post:
      tags: [Modules]
      summary: 创建模块任务
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModuleTaskPayload'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleTaskResult'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/modules/{moduleKey}/tasks/{taskId}:
    get:
      tags: [Modules]
      summary: 获取单个模块任务
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleTaskResult'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: 管理后台统计
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStats'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/dictionary:
    get:
      tags: [Admin]
      summary: 获取数据字典
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
          description: 可选，按 dictType 过滤
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataDictionaryResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module-factory/modules:
    get:
      tags: [Admin]
      summary: 获取已生成自定义模块
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedModuleListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module-factory/generate:
    post:
      tags: [Admin]
      summary: 根据设计文档生成子模块后台
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateModuleRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedModuleResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/users:
    get:
      tags: [Admin]
      summary: 用户列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: search
          schema:
            type: string
          description: 搜索用户姓名或账号
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/users/{id}/modules:
    put:
      tags: [Admin]
      summary: 更新用户开通模块
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserModulesRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/tasks:
    get:
      tags: [Admin]
      summary: 全局任务列表（含汇总）
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: moduleKey
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
          description: 任务ID/用户ID/场景/输入内容/摘要模糊搜索
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTaskListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/tasks/{taskId}:
    get:
      tags: [Admin]
      summary: 任务详情
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/tasks/{taskId}/review:
    post:
      tags: [Admin]
      summary: 单任务审核
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewTaskRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/tasks/review-bulk:
    post:
      tags: [Admin]
      summary: 批量审核
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkReviewRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkReviewResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/overview:
    get:
      tags: [Admin]
      summary: 模块概览
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminModuleOverview'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/tasks:
    get:
      tags: [Admin]
      summary: 模块任务列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: featureKey
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleTaskListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/features/{featureKey}/records:
    get:
      tags: [Admin]
      summary: 模块子功能记录列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
        - $ref: '#/components/parameters/FeatureKey'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: keyword
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleFeatureRecordListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/users:
    get:
      tags: [Admin]
      summary: 模块用户列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUser'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/reports:
    get:
      tags: [Admin]
      summary: 模块报告列表
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleReport'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/workbench:
    get:
      tags: [Admin]
      summary: 模块专属工作台
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleWorkbench'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /api/admin/module/{moduleKey}/settings:
    get:
      tags: [Admin]
      summary: 获取模块设置
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleSettings'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Admin]
      summary: 更新模块设置
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ModuleKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ModuleSettingsConfig'
                - type: object
                  properties:
                    config:
                      $ref: '#/components/schemas/ModuleSettingsConfig'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModuleSettings'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /reports/{fileName}:
    get:
      tags: [Reports]
      summary: 下载报告文件
      description: |
        支持两种鉴权方式（满足其一）：
        1) Authorization Bearer JWT
        2) URL query 参数 access（报告访问令牌）
      security:
        - bearerAuth: []
        - reportAccessToken: []
      parameters:
        - in: path
          name: fileName
          required: true
          schema:
            type: string
        - in: query
          name: access
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 成功，返回报告文件
          content:
            text/html:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    reportAccessToken:
      type: apiKey
      in: query
      name: access

  parameters:
    ModuleKey:
      in: path
      name: moduleKey
      required: true
      schema:
        type: string
    FeatureKey:
      in: path
      name: featureKey
      required: true
      schema:
        type: string
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  responses:
    ErrorResponse:
      description: 业务错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    TaskStatus:
      type: string
      enum: [review, queued, running, completed, failed]

    ApiMessage:
      type: object
      properties:
        message:
          type: string

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        queue:
          type: object
          properties:
            inFlight:
              type: integer
            maxConcurrency:
              type: integer
        time:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
        remember:
          type: boolean
          default: false

    RegisterRequest:
      type: object
      required: [name, contact, password]
      properties:
        name:
          type: string
        contact:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, customer]
          default: customer

    AuthUser:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        contact:
          type: string
        enabledModules:
          type: array
          items:
            type: string
        role:
          type: string
          enum: [admin, customer]
        tokenState:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/AuthUser'

    ModuleMeta:
      type: object
      properties:
        moduleKey:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [enterprise, personal]
        description:
          type: string
        icon:
          type: string
        status:
          type: string
        mobileSupported:
          type: boolean

    ModuleTaskResult:
      type: object
      properties:
        taskId:
          type: string
        moduleKey:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
        reportUrl:
          type: string
        errorMessage:
          type: string
          nullable: true

    ModuleTaskPayload:
      type: object
      required: [scenario, inputText]
      properties:
        scenario:
          type: string
        inputText:
          type: string
        attachments:
          type: array
          items:
            type: string

    ModuleTaskSchemaMetric:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        unit:
          type: string

    ModuleTaskSchema:
      type: object
      properties:
        scenarios:
          type: array
          items:
            type: string
        inputHints:
          type: array
          items:
            type: string
        samplePrompt:
          type: string
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/ModuleTaskSchemaMetric'

    DashboardReport:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        format:
          type: string
        url:
          type: string

    DashboardNotification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        level:
          type: string
        createdAt:
          type: string
          format: date-time

    CustomerDashboardData:
      type: object
      properties:
        openedModules:
          type: array
          items:
            type: string
        recentTasks:
          type: array
          items:
            $ref: '#/components/schemas/ModuleTaskResult'
        reports:
          type: array
          items:
            $ref: '#/components/schemas/DashboardReport'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/DashboardNotification'

    ModuleRankItem:
      type: object
      properties:
        moduleKey:
          type: string
        name:
          type: string
        category:
          type: string
        icon:
